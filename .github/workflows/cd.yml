name: CD — Build & Deploy

on:
  push:
    branches: [main]

# ✅ Prevent concurrent deploys (avoid race conditions)
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}/taskmanager

jobs:
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      # ✅ Tag images with short git SHA for traceability
      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ BuildKit cache speeds up repeated builds significantly
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production  # Requires manual approval in GitHub

    steps:
      - uses: actions/checkout@v4

      # ✅ Connect to your cluster using a kubeconfig secret
      - name: Configure Kubernetes
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v3

      # ✅ helm upgrade --install = create if not exists, upgrade if exists
      - name: Deploy with Helm
        run: |
          helm upgrade --install taskmanager ./helm/taskmanager \
            --namespace taskmanager \
            --create-namespace \
            --set backend.image.tag=${{ needs.build-and-push.outputs.image-tag }} \
            --set frontend.image.tag=${{ needs.build-and-push.outputs.image-tag }} \
            --set postgresql.auth.username=${{ secrets.DB_USER }} \
            --set postgresql.auth.password=${{ secrets.DB_PASSWORD }} \
            --values ./helm/taskmanager/values/prod.yaml \
            --wait \        # Wait for all pods to be ready
            --timeout 5m    # Fail if deploy takes > 5 minutes

      # ✅ Smoke test after deploy
      - name: Smoke test
        run: |
          kubectl run smoke-test \
            --image=curlimages/curl \
            --restart=Never \
            --rm -it \
            -n taskmanager \
            -- curl -f http://frontend-service/health