name: CD — Build & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
      image-prefix: ${{ steps.prefix.outputs.prefix }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set image prefix
        id: prefix
        run: echo "prefix=${{ secrets.DOCKER_USERNAME }}/taskmanager" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.prefix.outputs.prefix }}-backend:${{ steps.tag.outputs.tag }}
            ${{ steps.prefix.outputs.prefix }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.prefix.outputs.prefix }}-frontend:${{ steps.tag.outputs.tag }}
            ${{ steps.prefix.outputs.prefix }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Configure Kubernetes
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Deploy with Helm
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          IMAGE_PREFIX: ${{ needs.build-and-push.outputs.image-prefix }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: helm upgrade --install taskmanager ./helm/taskmanager --namespace taskmanager --create-namespace --set backend.image.tag="$IMAGE_TAG" --set frontend.image.tag="$IMAGE_TAG" --set backend.image.repository="$IMAGE_PREFIX-backend" --set frontend.image.repository="$IMAGE_PREFIX-frontend" --set postgresql.auth.username="$DB_USER" --set postgresql.auth.password="$DB_PASSWORD" --values ./helm/taskmanager/values/prod.yaml --wait --timeout 5m