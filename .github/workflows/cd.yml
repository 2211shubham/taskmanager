name: CD — Build & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
      image-prefix: ${{ steps.prefix.outputs.prefix }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set image prefix
        id: prefix
        run: echo "prefix=${{ secrets.DOCKER_USERNAME }}/taskmanager" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.prefix.outputs.prefix }}-backend:${{ steps.tag.outputs.tag }}
            ${{ steps.prefix.outputs.prefix }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.prefix.outputs.prefix }}-frontend:${{ steps.tag.outputs.tag }}
            ${{ steps.prefix.outputs.prefix }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Configure Kubernetes
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Deploy with Helm
        run: |
          helm upgrade --install taskmanager ./helm/taskmanager \
            --namespace taskmanager \
            --create-namespace \
            --set backend.image.tag=${{ needs.build-and-push.outputs.image-tag }} \
            --set frontend.image.tag=${{ needs.build-and-push.outputs.image-tag }} \
            --set backend.image.repository=${{ needs.build-and-push.outputs.image-prefix }}-backend \
            --set frontend.image.repository=${{ needs.build-and-push.outputs.image-prefix }}-frontend \
            --set postgresql.auth.username=${{ secrets.DB_USER }} \
            --set postgresql.auth.password=${{ secrets.DB_PASSWORD }} \
            --values ./helm/taskmanager/values/prod.yaml \
            --wait \
            --timeout 5m

      - name: Smoke test
        run: |
          kubectl run smoke-test \
            --image=curlimages/curl \
            --restart=Never \
            --rm -it \
            -n taskmanager \
            -- curl -f http://frontend-service/health