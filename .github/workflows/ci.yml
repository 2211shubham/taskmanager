name: CI — Test & Lint

# ✅ Trigger on Pull Requests to main
on:
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    # ✅ Run a real Postgres for integration tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: taskmanager_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # ✅ Cache npm deps for faster runs
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run tests with coverage
        run: npm test -- --coverage
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_NAME: taskmanager_test
          DB_USER: test
          DB_PASSWORD: testpass

      # ✅ Upload coverage so you can track it
      - name: Upload coverage
        uses: codecov/codecov-action@v3

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci && npm test -- --watchAll=false
        working-directory: frontend

  lint-helm:
    name: Lint Helm Charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v3
      - name: Lint chart
        run: helm lint ./helm/taskmanager

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail the build on HIGH/CRITICAL vulns