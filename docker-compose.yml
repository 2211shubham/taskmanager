services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: taskmanager      # ← database name
      POSTGRES_USER: app            # ← username
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d taskmanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DB_HOST: postgres
      DB_NAME: taskmanager          # ← must match POSTGRES_DB above
      DB_USER: app                  # ← must match POSTGRES_USER above
      DB_PASSWORD: localpassword    # ← must match POSTGRES_PASSWORD above
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: on-failure