apiVersion: v1
kind: Service
metadata:
  name: {{ include "taskmanager.fullname" . }}-frontend
spec:
  selector:
    app.kubernetes.io/component: frontend
  ports:
    - port: 80
      targetPort: 80
---
# Backend Service (ClusterIP — internal only)
apiVersion: v1
kind: Service
metadata:
  name: backend-service  # nginx.conf proxies to this exact name
spec:
  selector:
    app.kubernetes.io/component: backend
  ports:
    - port: 3000
      targetPort: 3000